name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# Configurable via repo Variables (Settings → Secrets and variables → Actions → Variables):
#   PAGES_BASE       — Pages base path. Default '/curriculumcraft/'.
#   HF_BACKEND_URL   — Hugging Face Space hostname for VITE_API_BASE_URL.
#                      Default 'https://scriptmaker-curriculumcraft.hf.space'.
# Forks should override these if they deploy under a different repo name
# or HF Space slug.

jobs:
  build:
    name: Build (Vite, Pages target)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build for GitHub Pages
        working-directory: frontend
        env:
          APP_BUILD_TARGET: pages
          VITE_PAGES_BASE: ${{ vars.PAGES_BASE || '/curriculumcraft/' }}
          VITE_API_BASE_URL: ${{ vars.HF_BACKEND_URL || 'https://scriptmaker-curriculumcraft.hf.space' }}
        run: npm run build

      - name: Disable Jekyll
        run: touch frontend/dist/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
